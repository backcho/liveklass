spring:
  application:
    name: liveklass
  jackson:
    time-zone: Asia/Seoul # G-3 전 구간 KST
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false # 배치 잡은 phase-3에서 명시적으로 기동 (C-1)
    jdbc:
      initialize-schema: always

springdoc:
  swagger-ui:
    tags-sorter: alpha
    path: /swagger-ui.html

liveklass:
  migrate-only: false # 'make migrate' 전용 — true면 스키마만 맞추고 즉시 종료
  seed:
    enabled: false # 'make seed'에서만 true — 매 기동마다 재시딩되지 않도록
  enrollment:
    cancel-period-days: 7 # A-4: CONFIRMED 취소 기한
  waitlist:
    payment-due-hours: 24 # A-6: 승격 결제 기한
    expiry-check-delay: 60s # 승격 기한 만료 잡 폴링 간격
  notification:
    retry:
      max-count: 3 # C-3: 임계 도달 시 DEAD (총 시도 3회)
      interval: 5m # C-3: 재시도 간격
    processing-timeout: 3m # C-4: 재시도 간격보다 짧게 유지
    batch-size: 100
    send-poll-delay: 10s
    recovery-poll-delay: 60s
