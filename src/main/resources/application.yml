spring:
  application:
    name: liveklass
  jackson:
    time-zone: Asia/Seoul # G-3 전 구간 KST
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false # 배치 잡은 phase-3에서 명시적으로 기동 (C-1)
    jdbc:
      initialize-schema: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
