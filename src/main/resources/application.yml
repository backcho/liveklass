spring:
  application:
    name: liveklass
  jackson:
    time-zone: Asia/Seoul # G-3 전 구간 KST
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  batch:
    job:
      enabled: false # 배치 잡은 phase-3에서 명시적으로 기동 (C-1)
    jdbc:
      initialize-schema: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

liveklass:
  enrollment:
    cancel-period-days: 7 # A-4: CONFIRMED 취소 기한
  waitlist:
    payment-due-hours: 24 # A-6: 승격 결제 기한
    expiry-check-delay: 60s # 승격 기한 만료 잡 폴링 간격
